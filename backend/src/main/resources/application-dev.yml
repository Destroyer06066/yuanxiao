spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/campus_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: campus-exports
  public-url: http://localhost:9000/campus-exports

integration:
  registration-platform:
    base-url: http://localhost:8081/mock-api
    connect-timeout: 5000
    read-timeout: 10000
    retry-max-attempts: 3

jwt:
  private-key-path: classpath:keys/jwt-private.pem
  public-key-path: classpath:keys/jwt-public.pem
  access-token-validity-seconds: 7200
  session-validity-seconds: 28800

logging:
  level:
    com.campus.platform: DEBUG
